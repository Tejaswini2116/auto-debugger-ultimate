<!DOCTYPE html>
<html>
<head>
<title>Auto Debugger Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

:root{
--success:#22c55e;
--danger:#ef4444;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
min-height:100vh;
}

/* LOGIN */
.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.login-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
width:340px;
text-align:center;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:none;
outline:none;
font-family:monospace;
}

textarea{
background:#0f172a;
color:#22c55e;
height:170px;
}

nav{
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
color:white;
cursor:pointer;
margin:5px;
font-weight:600;
transition:0.3s;
}

button:hover{
transform:scale(1.07);
box-shadow:0 0 15px rgba(255,255,255,0.7);
}

.container{padding:25px;}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
margin:20px 0;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.progress-bg{
background:rgba(255,255,255,0.3);
height:10px;
border-radius:20px;
}

.progress-bar{
height:10px;
width:0%;
background:linear-gradient(to right,#00f5a0,#00d9f5);
border-radius:20px;
transition:0.4s;
}

.mascot{
font-size:65px;
text-align:center;
filter:drop-shadow(0 0 15px #fff);
}

.bounce{
animation:bounce 0.4s;
}

@keyframes bounce{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.error{color:#ff4d6d;font-weight:600;}
.success{color:#00f5a0;font-weight:600;}

/* Floating Chat */
#chatToggle{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
color:white;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
z-index:999;
box-shadow:0 0 20px rgba(255,255,255,0.7);
}

#chatWindow{
display:none;
position:fixed;
bottom:100px;
right:25px;
width:320px;
background:rgba(0,0,0,0.85);
color:white;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
padding:15px;
z-index:999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-container">
<div class="login-card">
<h2>🔐 Auto Debugger Login</h2>
<input type="email" id="loginEmail" placeholder="Enter Email">
<input type="password" id="loginPassword" placeholder="Enter Password">
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">

<nav>
<div><b>🎓 Auto Debugger Ultimate</b></div>
<div>
<button onclick="logout()">🚪</button>
</div>
</nav>

<div class="container">

<div class="card">
<h2>Live Typing Debugger</h2>

<select id="language">
<option value="c">C</option>
<option value="java">Java</option>
<option value="python">Python</option>
</select>

<textarea id="codeInput" placeholder="Start typing code..."></textarea>

<div id="result">
<div class="mascot">🤖</div>
<div style="text-align:center;">Start typing your code...</div>
</div>
</div>

<div class="card">
<h3>🏆 Scoreboard</h3>
<p>Points: <span id="points">0</span></p>
<p>Level: <span id="level">Beginner</span></p>
<p>AI Confidence: <span id="aiScore">0%</span></p>
<p>Accuracy: <span id="accuracy">100%</span></p>
<p>Time Spent: <span id="timer">0</span> sec</p>

<p>Progress to Next Level:</p>
<div class="progress-bg">
<div id="progressBar" class="progress-bar"></div>
</div>

<div id="badges"></div>
</div>

<div class="card">
<h3>🏅 Leaderboard</h3>
<input type="text" id="playerName" placeholder="Enter Name">
<button onclick="saveScore()">Save Score</button>
<ul id="leaderboard"></ul>
</div>

</div>
</div>

<!-- CHAT -->
<div id="chatToggle" onclick="toggleChat()">🤖</div>

<div id="chatWindow">
<h4>AI Debug Assistant</h4>
<div id="chatBox" style="height:150px;overflow-y:auto;background:#0f172a;
padding:8px;border-radius:8px;font-family:monospace;font-size:13px;"></div>

<input type="text" id="chatInput" placeholder="Ask me..."
style="width:100%;padding:8px;margin-top:5px;border-radius:8px;border:none;">
<button onclick="sendMessage()" style="width:100%;margin-top:5px;">Send</button>
</div>

<audio id="successSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="errorSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

/* LOGIN */
function login(){
let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPassword").value;
if(
email==="admin@gmail.com" &&
password==="admin123"
){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainApp").style.display="block";
}else{
document.getElementById("loginMsg").innerText="Invalid Email or Password";
}
}
function logout(){ location.reload(); }

/* VARIABLES */
let points=0,lastCode="",streak=0,totalChecks=0,totalErrors=0,seconds=0;
let quizUnlocked=false,quizIndex=0,quizScore=0;

const languageQuizzes={
c:[
{q:"Which symbol ends a C statement?",o:[";",":"],a:";"},
{q:"Which function prints output in C?",o:["printf","print"],a:"printf"},
{q:"Which keyword defines entry function?",o:["main","start"],a:"main"},
{q:"Which symbol starts a block?",o:["{","("],a:"{"},
{q:"Which header is used for printf?",o:["stdio.h","math.h"],a:"stdio.h"}
],
java:[
{q:"Which method is entry point in Java?",o:["main","start"],a:"main"},
{q:"Which keyword creates class?",o:["class","define"],a:"class"},
{q:"Which prints output?",o:["System.out.println","print"],a:"System.out.println"}
],
python:[
{q:"How do you define function?",o:["def","function"],a:"def"},
{q:"Which symbol ends Python function definition?",o:[":",";"],a:":"},
{q:"Which keyword creates loop?",o:["while","loop"],a:"while"}
]
};

setInterval(()=>{
seconds++;
document.getElementById("timer").innerText=seconds;
},1000);

const codeInput=document.getElementById("codeInput");
const result=document.getElementById("result");

codeInput.addEventListener("input",()=>analyze(codeInput.value));

function analyze(code){

if(code.length===0){
result.innerHTML=`<div class="mascot">🤖</div>
<div style="text-align:center;">Start typing your code...</div>`;
return;
}

totalChecks++;
let language=document.getElementById("language").value;
let errors=[];

if(language==="c" || language==="java"){

let lines=code.split("\n");
lines.forEach(line=>{
let t=line.trim();
if(t.length>0 && !t.endsWith(";") && !t.endsWith("{") && !t.endsWith("}") &&
!t.startsWith("if") && !t.startsWith("while") && !t.startsWith("for") && !t.startsWith("//")){
errors.push("Possible missing ;");
}
});

if(code.includes("while(true)") && !code.includes("break")){
errors.push("Infinite loop detected");
}

let open=(code.match(/{/g)||[]).length;
let close=(code.match(/}/g)||[]).length;
if(open!==close){
errors.push("Unmatched curly braces");
}

if(code.includes("if(") && code.includes("=") && !code.includes("==")){
errors.push("Use == for comparison");
}
}

if(language==="python"){
if(code.includes("def") && !code.includes(":")){
errors.push("Missing : in function definition");
}
if(code.includes("{") || code.includes("}")){
errors.push("Python does not use curly braces");
}
}

if(errors.length>0){
streak=0;
totalErrors++;
document.getElementById("errorSound").play();

result.innerHTML=`
<div class="mascot bounce">😵</div>
<div class="error" style="text-align:center;font-weight:bold;">
${errors.map(e=>`<p>⚠ ${e}</p>`).join("")}
</div>`;
}else if(code!==lastCode){
streak++;
points+=5+streak;
document.getElementById("successSound").play();

result.innerHTML=`
<div class="mascot bounce">😄</div>
<div class="success" style="text-align:center;font-weight:bold;">
✅ Looks good!
</div>`;
}

lastCode=code;
updateUI();
}

function updateUI(){
document.getElementById("points").innerText=points;
updateLevel();
updateAccuracy();
detectAI(codeInput.value);
let badge="";

if(points>=50) badge="🥉 Beginner Debugger";
if(points>=150) badge="🥈 Error Hunter";
if(points>=300) badge="🥇 Master Debugger";

document.getElementById("badges").innerHTML=badge;
}

function updateLevel(){
if(points>=50)
document.getElementById("level").innerText="Intermediate";

if(points>=150)
document.getElementById("level").innerText="Advanced";

if(points>=300)
document.getElementById("level").innerText="Expert";
  
let progress=points%50;
document.getElementById("progressBar").style.width=(progress/50)*100+"%";

if(points>=100 && !quizUnlocked){
quizUnlocked=true;
startQuiz();
}
}

function startQuiz(){
quizIndex=0;
quizScore=0;
showQuiz();
}

function showQuiz(){
let lang=document.getElementById("language").value;
let questions=languageQuizzes[lang];

if(quizIndex>=questions.length){
result.innerHTML=`
<div class="mascot bounce">🎉</div>
<div style="text-align:center;font-weight:bold;color:lime;">
Quiz Completed! Score: ${quizScore}/${questions.length}
</div>`;
points+=quizScore*20;
updateUI();
return;
}

let q=questions[quizIndex];
result.innerHTML=`
<div class="mascot">🧠</div>
<div style="text-align:center;font-weight:bold;">
<h3>Language Quiz</h3>
<p>${q.q}</p>
${q.o.map(opt=>`<button onclick="answerQuiz('${opt}')">${opt}</button>`).join("")}
</div>`;
}

function answerQuiz(ans){
let lang=document.getElementById("language").value;
let questions=languageQuizzes[lang];
if(ans===questions[quizIndex].a) quizScore++;
quizIndex++;
showQuiz();
}

function detectAI(code){
let confidence=0;
if(code.includes(";")) confidence+=30;
if(code.includes("{")&&code.includes("}")) confidence+=30;
if(code.includes("return")) confidence+=20;
if(code.length>100) confidence+=20;
if(confidence>100) confidence=100;
document.getElementById("aiScore").innerText=confidence+"%";
}

function updateAccuracy(){
let accuracy=totalChecks===0?100:
Math.max(0,100-Math.floor((totalErrors/totalChecks)*100));
document.getElementById("accuracy").innerText=accuracy+"%";
}

function saveScore(){
let name=document.getElementById("playerName").value;
if(!name) return;
let scores=JSON.parse(localStorage.getItem("scores"))||[];
scores.push({name:name,score:points});
scores.sort((a,b)=>b.score-a.score);
localStorage.setItem("scores",JSON.stringify(scores));
displayLeaderboard();
}

function displayLeaderboard(){
let scores=JSON.parse(localStorage.getItem("scores"))||[];
let list=document.getElementById("leaderboard");
list.innerHTML="";
scores.slice(0,5).forEach(s=>{
list.innerHTML+=`<li>${s.name} - ${s.score}</li>`;
});
}
displayLeaderboard();

/* CHATBOT */
function toggleChat(){

let chat=document.getElementById("chatWindow");

if(
chat.style.display==="none" ||
chat.style.display===""){
chat.style.display="block";
}else{
chat.style.display="none";
}

}

function sendMessage(){

let input=document.getElementById("chatInput").value.toLowerCase();
let chatBox=document.getElementById("chatBox");
let response="";

chatBox.innerHTML+="<div>> "+input+"</div>";

if(input.includes("semicolon"))
response="In C and Java, statements must end with ';'.";

else if(input.includes("python"))
response="Python uses ':' and indentation instead of curly braces.";

else if(input.includes("comparison"))
response="Use '==' for comparison. '=' is assignment.";

else if(input.includes("loop"))
response="A loop repeatedly executes a block of code until a condition is met.";

else if(input.includes("array"))
response="An array stores multiple values in a single variable.";

else if(input.includes("function"))
response="A function is a reusable block of code that performs a specific task.";

else if(input.includes("variable"))
response="A variable is used to store data values in a program.";

else if(input.includes("java"))
response="Java is an object-oriented programming language used for web, mobile, and enterprise applications.";

else if(input.includes("c language") || input==="c")
response="C is a procedural programming language and the foundation for many modern languages.";

else if(input.includes("debug"))
response="Debugging is the process of finding and fixing errors in a program.";

else if(input.includes("error"))
response="Errors can be syntax errors, runtime errors, or logical errors.";

else if(input.includes("string"))
response="A string is a sequence of characters used to store text.";

else if(input.includes("class"))
response="A class is a blueprint for creating objects in object-oriented programming.";

else if(input.includes("object"))
response="An object is an instance of a class containing data and methods.";

else if(input.includes("html"))
response="HTML is used to structure content on web pages.";

else if(input.includes("css"))
response="CSS is used to style and design web pages.";

else if(input.includes("javascript"))
response="JavaScript adds interactivity and dynamic behavior to websites.";

else if(input.includes("api"))
response="An API allows different software applications to communicate with each other.";

else if(input.includes("database"))
response="A database is used to store, organize, and retrieve data efficiently.";

else
response="Try asking about loops, arrays, functions, variables, HTML, CSS, JavaScript, APIs, databases, Python, Java, or debugging.";

chatBox.innerHTML+="<div style='color:#22c55e;'>AI: "+response+"</div>";
chatBox.scrollTop=chatBox.scrollHeight;
document.getElementById("chatInput").value="";
}

</script>
</body>
</html>
